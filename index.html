<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Arcade</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #00eaff;
      text-shadow: 0 0 20px #00eaff, 0 0 40px #00eaff55;
    }

    p {
      margin-top: 1.5rem;
      font-size: 1.4rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>My Arcade</h1>
  <p>Games Coming Soon</p>
</body>
</html>
