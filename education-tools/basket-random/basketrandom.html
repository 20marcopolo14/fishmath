<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Basket Random</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #game-code { width: 100%; height: 100%; }
        #game-area { width: 100%; height: 100%; border: none; display: block; }
        .back-button {
          position: fixed;
          top: 20px;
          left: 20px;
          width: 50px;
          height: 50px;
          background: #00eaff;
          color: #0a0a1a;
          border: none;
          border-radius: 50%;
          font-size: 24px;
          cursor: pointer;
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          text-decoration: none;
          box-shadow: 0 0 20px rgba(0, 234, 255, 0.5);
          transition: all 0.3s ease;
        }
        .back-button:hover {
          transform: scale(1.1);
          box-shadow: 0 0 30px rgba(0, 234, 255, 0.8);
        }
    </style>
</head>
<body>
<a href="../../index.html" class="back-button">←</a>
<div id="game-code" class="game-frame" data-id="1" style="display: block;">
  <iframe class="game-iframe" id="game-area" src="https://edumathtools.com/player?src=https%3A%2F%2Fgeet.in.net%2Fget%2Fbasket-random%2Fgame.html"
    allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
    scrolling="no" frameborder="0" allowfullscreen></iframe>
</div>
</body>
</html>
